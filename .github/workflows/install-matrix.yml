name: install-matrix

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package-install:
    name: Package install (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Build wheel
        run: |
          $ErrorActionPreference = "Stop"
          $dist = Join-Path $env:RUNNER_TEMP "gra-dist"
          python -m pip install --upgrade build
          python -m build --wheel --outdir $dist
        shell: pwsh
      - name: Validate installed wheel console scripts and resources
        run: |
          $ErrorActionPreference = "Stop"
          $venv = Join-Path $env:RUNNER_TEMP "gra-package-venv"
          $dist = Join-Path $env:RUNNER_TEMP "gra-dist"
          $mockBin = Join-Path $env:RUNNER_TEMP "gra-mock-bin"
          $runs = Join-Path $env:RUNNER_TEMP "gra-doctor-runs"
          $fixture = Join-Path $env:RUNNER_TEMP "gra-minimal-run"
          $auditRuns = Join-Path $env:RUNNER_TEMP "gra-installed-runs"
          $batchRuns = Join-Path $env:RUNNER_TEMP "gra-installed-batch-runs"
          $repoList = Join-Path $env:RUNNER_TEMP "gra-package-repos.txt"
          $efficacyJson = Join-Path $env:RUNNER_TEMP "gra-efficacy.json"
          $efficacyMarkdown = Join-Path $env:RUNNER_TEMP "gra-efficacy.md"
          $efficacyComparisonJson = Join-Path $env:RUNNER_TEMP "gra-efficacy-comparison.json"
          $efficacyComparisonMarkdown = Join-Path $env:RUNNER_TEMP "gra-efficacy-comparison.md"
          New-Item -ItemType Directory -Force -Path $mockBin | Out-Null
          python -m venv $venv
          if ($IsWindows) {
            $python = Join-Path $venv "Scripts/python.exe"
            $bin = Join-Path $venv "Scripts"
          } else {
            $python = Join-Path $venv "bin/python"
            $bin = Join-Path $venv "bin"
          }
          & $python -m pip install --no-index --find-links $dist genai-repo-auditor
          $mockBuilder = @'
          from pathlib import Path
          import os
          import stat
          import sys
          import zipfile

          root = Path(os.environ["GRA_MOCK_BIN"])
          root.mkdir(parents=True, exist_ok=True)
          script = r'''
          from pathlib import Path
          import json
          import os
          import sys

          tool = sys.argv[1]
          args = sys.argv[2:]
          if tool == "gh":
              if args[:2] == ["repo", "clone"] and len(args) >= 4:
                  clone_dir = Path(args[3])
                  clone_dir.mkdir(parents=True, exist_ok=True)
                  (clone_dir / "AGENTS.md").write_text(
                      "# Offline install-matrix fixture\n\nReview defensively.\n",
                      encoding="utf-8",
                  )
                  raise SystemExit(0)
              if args[:2] == ["repo", "view"]:
                  print("PUBLIC")
                  raise SystemExit(0)
              print("unexpected gh invocation: " + " ".join(args), file=sys.stderr)
              raise SystemExit(97)
          if tool == "git":
              if args[:1] == ["--version"]:
                  print("git version 9.9.9")
                  raise SystemExit(0)
              if len(args) >= 4 and args[0] == "-C" and args[2:4] == ["rev-parse", "HEAD"]:
                  print("0123456789abcdef0123456789abcdef01234567")
                  raise SystemExit(0)
              if len(args) >= 4 and args[0] == "-C" and args[2:4] == ["branch", "--show-current"]:
                  print("main")
                  raise SystemExit(0)
              print("unexpected git invocation: " + " ".join(args), file=sys.stderr)
              raise SystemExit(97)
          if tool == "codex":
              if args[:1] == ["--help"]:
                  print("codex help")
                  raise SystemExit(0)
              if args[:1] == ["exec"] and "--cd" in args and "--output-last-message" in args:
                  run_dir = Path(args[args.index("--cd") + 1])
                  output = Path(args[args.index("--output-last-message") + 1])
                  output.parent.mkdir(parents=True, exist_ok=True)
                  failure_marker = os.environ.get("GRA_MOCK_CODEX_FAIL_ONCE_FILE")
                  if output.name == "codex-targets-final.md" and failure_marker and not Path(failure_marker).exists():
                      Path(failure_marker).write_text("failed once\n", encoding="utf-8")
                      print("offline requested worker failure", file=sys.stderr)
                      raise SystemExit(9)
                  output.write_text("offline install-matrix worker fixture\n", encoding="utf-8")
                  reports = run_dir / "reports"
                  reports.mkdir(parents=True, exist_ok=True)
                  if output.name == "codex-recon-final.md":
                      for name in ["AUDIT_SUMMARY.md", "THREAT_MODEL.md", "ATTACK_SURFACE.md"]:
                          (reports / name).write_text(f"# {name}\n\nOffline install-matrix fixture.\n", encoding="utf-8")
                  elif output.name == "codex-targets-final.md":
                      context = json.loads((run_dir / "context.json").read_text(encoding="utf-8"))
                      targets = {
                          "run_id": context["run_id"],
                          "repo": context["repo"],
                          "branch": context.get("branch"),
                          "commit": context["commit"],
                          "generated_at": "2026-01-01T00:00:00Z",
                          "targets": [],
                      }
                      (reports / "targets.json").write_text(json.dumps(targets) + "\n", encoding="utf-8")
                  else:
                      print("unexpected codex output path: " + output.name, file=sys.stderr)
                      raise SystemExit(97)
                  print("{}")
                  raise SystemExit(0)
              print("codex mock should not be executed", file=sys.stderr)
              raise SystemExit(97)
          raise SystemExit(98)
          '''
          (root / "mock_tool.py").write_text(script, encoding="utf-8")
          entry_script = '''
          from pathlib import Path
          import runpy
          import sys

          def _run(tool):
              original = sys.argv
              sys.argv = [str(Path(__file__).with_name("mock_tool.py")), tool, *original[1:]]
              try:
                  runpy.run_path(sys.argv[0], run_name="__main__")
              except SystemExit as exc:
                  return exc.code
              finally:
                  sys.argv = original

          def gh():
              return _run("gh")

          def git():
              return _run("git")

          def codex():
              return _run("codex")
          '''
          (root / "mock_entry.py").write_text(entry_script, encoding="utf-8")
          wheel = root / "gra_install_matrix_mocks-0.0.0-py3-none-any.whl"
          dist_info = "gra_install_matrix_mocks-0.0.0.dist-info"
          entries = {
              "mock_tool.py": script,
              "mock_entry.py": entry_script,
              f"{dist_info}/METADATA": "Metadata-Version: 2.1\nName: gra-install-matrix-mocks\nVersion: 0.0.0\n",
              f"{dist_info}/WHEEL": "Wheel-Version: 1.0\nGenerator: install-matrix\nRoot-Is-Purelib: true\nTag: py3-none-any\n",
              f"{dist_info}/entry_points.txt": "[console_scripts]\ngh = mock_entry:gh\ngit = mock_entry:git\ncodex = mock_entry:codex\n",
          }
          entries[f"{dist_info}/RECORD"] = "".join(f"{name},,\n" for name in [*entries, f"{dist_info}/RECORD"])
          with zipfile.ZipFile(wheel, "w", compression=zipfile.ZIP_DEFLATED) as archive:
              for name, value in entries.items():
                  archive.writestr(name, value)
          for tool in ["gh", "git", "codex"]:
              if os.name == "nt":
                  (root / f"{tool}.cmd").write_text(f'@echo off\r\npython "%~dp0mock_tool.py" {tool} %*\r\n', encoding="ascii")
              else:
                  wrapper = root / tool
                  wrapper.write_text(f'#!/bin/sh\nexec python "{root / "mock_tool.py"}" {tool} "$@"\n', encoding="utf-8")
                  wrapper.chmod(wrapper.stat().st_mode | stat.S_IXUSR | stat.S_IXGRP | stat.S_IXOTH)
          '@
          $env:GRA_MOCK_BIN = $mockBin
          $mockBuilder | python
          $mockWheel = Join-Path $mockBin "gra_install_matrix_mocks-0.0.0-py3-none-any.whl"
          & $python -m pip install --no-index --no-deps $mockWheel
          $env:PATH = "$bin$([System.IO.Path]::PathSeparator)$mockBin$([System.IO.Path]::PathSeparator)$env:PATH"
          if ($IsWindows) {
            # Keep the process-heavy offline fixture deterministic and avoid CPython 3.10
            # runner failures while initializing hash randomization in child processes.
            $env:PYTHONHASHSEED = "0"
          }
          $probe = @'
          from pathlib import Path
          import genai_repo_auditor as gra
          from genai_repo_auditor.cli import COMMANDS

          assert len(COMMANDS) == 37, COMMANDS
          assert Path(gra.resource_path("VERSION")).is_file()
          assert Path(gra.resource_path("bin", "gra-doctor")).is_file()
          assert Path(gra.resource_path("lib", "agent_worker.py")).is_file()
          assert Path(gra.resource_path("lib", "platform_support.py")).is_file()
          assert Path(gra.prompt_path("exec", "full-audit.prompt.md")).is_file()
          assert Path(gra.report_schema_path("findings.schema.json")).is_file()
          assert Path(gra.report_schema_path("efficacy-comparison.schema.json")).is_file()
          assert Path(gra.report_schema_path("efficacy-worker-response.schema.json")).is_file()
          assert Path(gra.taxonomy_path("owasp-llm-2025.json")).is_file()
          assert Path(gra.agent_worker_profile_path("codex-cli.json")).is_file()
          assert Path(gra.efficacy_corpus_path("core.json")).is_file()
          import sys
          sys.path.insert(0, str(gra.resource_root() / "lib"))
          from efficacy_corpus import load_corpus
          assert len(load_corpus(gra.resource_root())["cases"]) >= 20
          '@
          $probe | & $python
          $commands = (& $python -c "from genai_repo_auditor.cli import COMMANDS; print(chr(10).join(COMMANDS))") -split "`n" | Where-Object { $_ }
          if ($commands.Count -ne 37) { throw "Expected 37 commands, got $($commands.Count): $commands" }
          $version = (Get-Content VERSION -TotalCount 1).Trim()
          foreach ($command in $commands) {
            & $command --help | Out-Null
            if ($LASTEXITCODE -ne 0) { throw "$command --help failed with $LASTEXITCODE" }
            $output = (& $command --version | Out-String).Trim()
            if ($LASTEXITCODE -ne 0) { throw "$command --version failed with $LASTEXITCODE" }
            if ($output -ne "$command $version") { throw "$command --version output '$output', expected '$command $version'" }
          }
          $env:GRA_HOLDOUT_SMOKE_ROOT = Join-Path $env:RUNNER_TEMP "gra-holdout-records"
          $holdoutProbe = @'
          import json
          import os
          from pathlib import Path
          import subprocess
          from tests.test_efficacy_holdout import records

          root = Path(os.environ["GRA_HOLDOUT_SMOKE_ROOT"])
          root.mkdir()
          metadata, aggregate = records()
          (root / "holdout-metadata.json").write_text(
              json.dumps(metadata, indent=2, sort_keys=True) + "\n", encoding="utf-8"
          )
          (root / "holdout-aggregate.json").write_text(
              json.dumps(aggregate, indent=2, sort_keys=True) + "\n", encoding="utf-8"
          )
          completed = subprocess.run(
              ["gra-efficacy-holdout", "--records-root", os.fspath(root)],
              text=True,
              capture_output=True,
              timeout=30,
              check=False,
          )
          assert completed.returncode == 0, completed.stderr
          assert completed.stdout.startswith("Private holdout records validated\n"), completed.stdout
          '@
          $holdoutProbe | & $python
          $doctorReport = (gra-doctor --json --runs-dir $runs | Out-String) | ConvertFrom-Json
          if ($IsWindows) {
            if ($doctorReport.checks.platform_support.environment -ne "native-windows") { throw "gra-doctor did not classify native Windows" }
            if ($doctorReport.checks.platform_support.features.efficacy_report_generation -ne "unsupported-fail-closed") { throw "gra-doctor did not report native Windows efficacy boundary" }
          } elseif ($IsMacOS) {
            if ($doctorReport.checks.platform_support.environment -ne "macos") { throw "gra-doctor did not classify macOS" }
          } else {
            if ($doctorReport.checks.platform_support.environment -ne "linux") { throw "gra-doctor did not classify Linux" }
          }
          if ($doctorReport.checks.platform_support.features.workflow_plan_execute_resume -ne "supported") { throw "gra-doctor did not report workflow support" }
          gra-agent-check --list --json | Out-Null
          if ($IsWindows) {
            gra-efficacy-benchmark --list | Out-Null
            gra-efficacy-benchmark --list-configurations | Out-Null
            $efficacyError = Join-Path $env:RUNNER_TEMP "gra-efficacy-windows-error.txt"
            $ErrorActionPreference = "Continue"
            & gra-efficacy-benchmark --out-json $efficacyJson --out-md $efficacyMarkdown 2> $efficacyError
            $efficacyStatus = $LASTEXITCODE
            $ErrorActionPreference = "Stop"
            if ($efficacyStatus -ne 2) { throw "native Windows efficacy generation must fail closed with status 2, got $efficacyStatus" }
            if ((Get-Content $efficacyError -Raw) -notmatch "WSL2/Linux/macOS") { throw "native Windows efficacy diagnostic must recommend a supported environment" }
            if ((Test-Path $efficacyJson) -or (Test-Path $efficacyMarkdown)) { throw "native Windows efficacy failure created report outputs" }
          } else {
            gra-efficacy-benchmark --out-json $efficacyJson --out-md $efficacyMarkdown | Out-Null
            if (-not (Test-Path $efficacyJson) -or -not (Test-Path $efficacyMarkdown)) { throw "missing installed efficacy benchmark outputs" }
            gra-efficacy-benchmark --compare --out-json $efficacyComparisonJson --out-md $efficacyComparisonMarkdown | Out-Null
            if (-not (Test-Path $efficacyComparisonJson) -or -not (Test-Path $efficacyComparisonMarkdown)) { throw "missing installed efficacy comparison outputs" }
          }
          Copy-Item -Recurse tests/fixtures/minimal-run $fixture
          gra-validate-report --run $fixture | Out-Null
          gra-audit --repo acme/api --mode prepare --runs-dir $auditRuns --run-id installed-prepare | Out-Null
          $workflowRun = Join-Path $auditRuns "acme__api/installed-prepare"
          if (-not (Test-Path (Join-Path $workflowRun "run-manifest.json"))) { throw "missing installed gra-audit run manifest" }
          gra-run --run $workflowRun --profile recon-only | Out-Null
          if (-not (Test-Path (Join-Path $workflowRun "reports/workflow-plan.json"))) { throw "missing installed gra-run plan" }
          gra-run --run $workflowRun --profile recon-only --execute --until recon | Out-Null
          $pausedCheckpoint = Get-Content (Join-Path $workflowRun "reports/workflow-checkpoint.json") -Raw | ConvertFrom-Json
          if ($pausedCheckpoint.status -ne "paused" -or $pausedCheckpoint.resume_stage -ne "targets") { throw "unexpected bounded gra-run checkpoint" }
          gra-run --run $workflowRun --profile recon-only --resume | Out-Null
          $finalCheckpoint = Get-Content (Join-Path $workflowRun "reports/workflow-checkpoint.json") -Raw | ConvertFrom-Json
          if ($finalCheckpoint.status -ne "succeeded" -or $null -ne $finalCheckpoint.resume_stage) { throw "unexpected resumed gra-run checkpoint" }
          gra-scan --run $workflowRun --tool gitleaks --plan --sandbox-profile container --json | Out-Null
          gra-audit --repo acme/api --mode prepare --runs-dir $auditRuns --run-id installed-failure-resume | Out-Null
          $failureRun = Join-Path $auditRuns "acme__api/installed-failure-resume"
          $env:GRA_MOCK_CODEX_FAIL_ONCE_FILE = Join-Path $env:RUNNER_TEMP "gra-worker-failed-once.txt"
          $ErrorActionPreference = "Continue"
          & gra-run --run $failureRun --profile recon-only --execute | Out-Null
          $failureStatus = $LASTEXITCODE
          $ErrorActionPreference = "Stop"
          if ($failureStatus -ne 9) { throw "expected bounded workflow stage failure status 9, got $failureStatus" }
          $failedCheckpoint = Get-Content (Join-Path $failureRun "reports/workflow-checkpoint.json") -Raw | ConvertFrom-Json
          if ($failedCheckpoint.status -ne "blocked" -or $failedCheckpoint.resume_stage -ne "targets") { throw "unexpected failed gra-run checkpoint" }
          gra-run --run $failureRun --profile recon-only --resume | Out-Null
          Remove-Item Env:GRA_MOCK_CODEX_FAIL_ONCE_FILE
          $recoveredCheckpoint = Get-Content (Join-Path $failureRun "reports/workflow-checkpoint.json") -Raw | ConvertFrom-Json
          if ($recoveredCheckpoint.status -ne "succeeded" -or $null -ne $recoveredCheckpoint.resume_stage) { throw "unexpected recovered gra-run checkpoint" }
          if (-not $IsWindows) {
            Set-Content -Path $repoList -Value "acme/api"
            gra-batch --repo-list $repoList --mode goal --runs-dir $batchRuns --batch-id installed-batch | Out-Null
            if (-not (Test-Path (Join-Path $batchRuns "_batches/installed-batch/batch-results.json"))) { throw "missing installed gra-batch results" }
          }
        shell: pwsh
      - name: pipx install smoke (Linux)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: |
          python -m pip install --upgrade pipx
          python -m pipx install . --force --python "$(command -v python)"
          for bin_dir in "${PIPX_BIN_DIR:-}" "$HOME/.local/bin" /opt/pipx_bin; do
            if [ -n "$bin_dir" ] && [ -x "$bin_dir/gra-doctor" ]; then
              "$bin_dir/gra-doctor" --json --runs-dir "$RUNNER_TEMP/gra-pipx-doctor-runs" >/dev/null
              exit 0
            fi
          done
          echo "gra-doctor was not found in the expected pipx bin directories" >&2
          exit 1
