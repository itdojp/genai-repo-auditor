name: lint

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Check shell syntax
        run: |
          for f in bin/gra-*; do
            if head -n 1 "$f" | grep -q "bash"; then
              bash -n "$f"
            fi
          done
      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
      - name: Run ShellCheck
        run: |
          scripts/validate-shellcheck.sh
      - name: Check Python syntax
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import py_compile
          files = list(Path('lib').glob('*.py'))
          files += list(Path('src').rglob('*.py'))
          files += [p for p in Path('bin').glob('gra-*') if p.read_text(encoding='utf-8', errors='ignore').startswith('#!/usr/bin/env python3')]
          for p in files:
              py_compile.compile(str(p), doraise=True)
          print('python syntax ok')
          PY
      - name: Run integration tests
        run: |
          python3 -m unittest discover -s tests
      - name: Build Python package metadata
        run: |
          python3 -m pip install --upgrade build
          python3 -m build --outdir "$RUNNER_TEMP/gra-dist"
          python3 -m venv "$RUNNER_TEMP/gra-package-venv"
          "$RUNNER_TEMP/gra-package-venv/bin/python" -m pip install --no-index --find-links "$RUNNER_TEMP/gra-dist" genai-repo-auditor
          (cd "$RUNNER_TEMP" && "$RUNNER_TEMP/gra-package-venv/bin/python" - <<'PY'
          from pathlib import Path
          import genai_repo_auditor as gra

          root = gra.resource_root()
          assert "share/genai-repo-auditor" in str(root), root
          assert Path(gra.resource_path("VERSION")).is_file()
          assert Path(gra.resource_path("bin", "gra-validate-report")).is_file()
          assert Path(gra.resource_path("lib", "version.py")).is_file()
          assert Path(gra.prompt_path("exec", "full-audit.prompt.md")).is_file()
          assert Path(gra.report_schema_path("findings.schema.json")).is_file()
          assert Path(gra.taxonomy_path("owasp-llm-2025.json")).is_file()
          assert Path(gra.agent_worker_profile_path("codex-cli.json")).is_file()
          assert Path(gra.efficacy_corpus_path("core.json")).is_file()
          import sys
          sys.path.insert(0, str(root / "lib"))
          from efficacy_corpus import load_corpus
          assert len(load_corpus(root)["cases"]) >= 8
          PY
          )
          mock_bin="$RUNNER_TEMP/gra-package-mock-bin"
          mkdir -p "$mock_bin"
          cat > "$mock_bin/gh" <<'SH'
          #!/usr/bin/env bash
          set -euo pipefail
          if [[ "${1:-} ${2:-}" == "repo clone" ]]; then
            mkdir -p "${4:?}"
            exit 0
          fi
          if [[ "${1:-} ${2:-}" == "repo view" ]]; then
            echo PUBLIC
            exit 0
          fi
          echo "unexpected gh invocation: $*" >&2
          exit 97
          SH
          cat > "$mock_bin/git" <<'SH'
          #!/usr/bin/env bash
          set -euo pipefail
          if [[ "${1:-}" == "-C" && "${3:-} ${4:-}" == "rev-parse HEAD" ]]; then
            echo 0123456789abcdef0123456789abcdef01234567
            exit 0
          fi
          if [[ "${1:-}" == "-C" && "${3:-} ${4:-}" == "branch --show-current" ]]; then
            echo main
            exit 0
          fi
          echo "unexpected git invocation: $*" >&2
          exit 97
          SH
          cat > "$mock_bin/codex" <<'SH'
          #!/usr/bin/env bash
          set -euo pipefail
          echo "codex mock should not be executed in installed prepare smoke" >&2
          exit 97
          SH
          chmod +x "$mock_bin/gh" "$mock_bin/git" "$mock_bin/codex"
          commands="$($RUNNER_TEMP/gra-package-venv/bin/python - <<'PY'
          from genai_repo_auditor.cli import COMMANDS
          print("\n".join(COMMANDS))
          PY
          )"
          count="$(printf '%s\n' "$commands" | sed '/^$/d' | wc -l | tr -d ' ')"
          test "$count" = "36"
          version="$(sed -n '1p' VERSION)"
          while IFS= read -r command; do
            test -n "$command"
            (cd "$RUNNER_TEMP" && "$RUNNER_TEMP/gra-package-venv/bin/$command" --help >/dev/null)
            output="$(cd "$RUNNER_TEMP" && "$RUNNER_TEMP/gra-package-venv/bin/$command" --version)"
            test "$output" = "$command $version"
          done <<< "$commands"
          cp -R tests/fixtures/minimal-run "$RUNNER_TEMP/gra-minimal-run"
          (cd "$RUNNER_TEMP" && "$RUNNER_TEMP/gra-package-venv/bin/gra-agent-check" --list --json >/dev/null)
          (cd "$RUNNER_TEMP" && "$RUNNER_TEMP/gra-package-venv/bin/gra-efficacy-benchmark" --out-json "$RUNNER_TEMP/gra-efficacy.json" --out-md "$RUNNER_TEMP/gra-efficacy.md" >/dev/null)
          test -s "$RUNNER_TEMP/gra-efficacy.json"
          test -s "$RUNNER_TEMP/gra-efficacy.md"
          (cd "$RUNNER_TEMP" && "$RUNNER_TEMP/gra-package-venv/bin/gra-doctor" --json --runs-dir "$RUNNER_TEMP/gra-doctor-runs" >/dev/null)
          (cd "$RUNNER_TEMP" && "$RUNNER_TEMP/gra-package-venv/bin/gra-validate-report" --run "$RUNNER_TEMP/gra-minimal-run" >/dev/null)
          (cd "$RUNNER_TEMP" && PATH="$mock_bin:$PATH" "$RUNNER_TEMP/gra-package-venv/bin/gra-audit" --repo acme/api --mode prepare --runs-dir "$RUNNER_TEMP/gra-installed-runs" --run-id installed-prepare >/dev/null)
          test -f "$RUNNER_TEMP/gra-installed-runs/acme__api/installed-prepare/run-manifest.json"
          printf 'acme/api\n' > "$RUNNER_TEMP/gra-package-repos.txt"
          (cd "$RUNNER_TEMP" && PATH="$mock_bin:$PATH" "$RUNNER_TEMP/gra-package-venv/bin/gra-batch" --repo-list "$RUNNER_TEMP/gra-package-repos.txt" --mode goal --runs-dir "$RUNNER_TEMP/gra-installed-batch-runs" --batch-id installed-batch >/dev/null)
          test -f "$RUNNER_TEMP/gra-installed-batch-runs/_batches/installed-batch/batch-results.json"
          rm -rf build src/*.egg-info
      - name: Run local install smoke validation
        run: |
          scripts/validate-install-smoke.sh
      - name: Validate release metadata and tracked artifact boundary
        run: |
          python3 scripts/build_release.py --dry-run
      - name: Check executable bits
        run: |
          test -x bin/gra-audit
          test -x bin/gra-batch
          test -x bin/gra-validate-report
          test -x scripts/build_release.py
          test -x scripts/validate-install-smoke.sh
