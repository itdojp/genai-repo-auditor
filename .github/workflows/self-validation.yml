name: self-validation

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "47 3 * * 1"
  workflow_dispatch:

permissions: {}

jobs:
  prepare-fixture:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Create offline command fixtures
        run: |
          mkdir -p "$RUNNER_TEMP/gra-bin"

          cat > "$RUNNER_TEMP/gra-bin/gh" <<'GH'
          #!/usr/bin/env bash
          set -euo pipefail

          if [[ "${1:-}" == "repo" && "${2:-}" == "clone" ]]; then
            repo="${3:-}"
            dest="${4:-}"
            if [[ -z "$repo" || -z "$dest" ]]; then
              echo "mock gh: repo clone requires repo and destination" >&2
              exit 2
            fi
            mkdir -p "$dest"
            git init -b main "$dest" >/dev/null
            git -C "$dest" config user.email "fixture@example.invalid"
            git -C "$dest" config user.name "Fixture User"
            printf '# %s\n' "$repo" > "$dest/README.md"
            printf 'print("fixture")\n' > "$dest/app.py"
            git -C "$dest" add README.md app.py
            git -C "$dest" -c commit.gpgsign=false commit -m "init" >/dev/null
            exit 0
          fi

          if [[ "${1:-}" == "repo" && "${2:-}" == "view" ]]; then
            echo "PRIVATE"
            exit 0
          fi

          echo "mock gh: unsupported arguments: $*" >&2
          exit 2
          GH
          chmod +x "$RUNNER_TEMP/gra-bin/gh"

          cat > "$RUNNER_TEMP/gra-bin/codex" <<'CODEX'
          #!/usr/bin/env bash
          set -euo pipefail

          run_dir=""
          last_message=""
          json_output="0"

          # If this mock ever runs during the prepare-only step, that step has
          # regressed. The text is intentionally retained for workflow tests.
          prepare_mode_guard="offline codex mock should not run in prepare mode"

          while [[ $# -gt 0 ]]; do
            case "$1" in
              exec) shift ;;
              --cd) run_dir="${2:-}"; shift 2 ;;
              --output-last-message) last_message="${2:-}"; shift 2 ;;
              --json) json_output="1"; shift ;;
              --skip-git-repo-check) shift ;;
              --model|--sandbox|--ask-for-approval|--color|-c) shift 2 ;;
              -) shift ;;
              *) shift ;;
            esac
          done

          if [[ -z "$run_dir" ]]; then
            echo "mock codex: missing --cd run directory" >&2
            exit 2
          fi

          cat >/dev/null

          RUN_DIR="$run_dir" python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          run_dir = Path(os.environ["RUN_DIR"])
          ctx = json.loads((run_dir / "context.json").read_text(encoding="utf-8"))
          reports = run_dir / "reports"
          issue_dir = reports / "issue-drafts"
          issue_dir.mkdir(parents=True, exist_ok=True)
          (issue_dir / "SEC-SELF-VALIDATION-001.md").write_text(
              "# Fixture self-validation finding\n\n"
              "This issue body is generated by the offline Codex mock in CI.\n\n"
              "<!-- genai-repo-auditor:fingerprint=selfvalidation001 -->\n",
              encoding="utf-8",
          )
          findings = {
              "run_id": ctx["run_id"],
              "repo": ctx["repo"],
              "commit": ctx["commit"],
              "generated_at": "2026-05-18T00:00:00Z",
              "findings": [
                  {
                      "id": "SEC-SELF-VALIDATION-001",
                      "fingerprint": "selfvalidation001",
                      "title": "Fixture self-validation finding",
                      "severity": "High",
                      "confidence": "High",
                      "status": "Confirmed",
                      "category": "test-fixture",
                      "affected_locations": [
                          {
                              "file": "app.py",
                              "line": 1,
                              "end_line": 1,
                          }
                      ],
                      "entry_point": "tests.fixture.entry",
                      "trust_boundary": "offline fixture input",
                      "source_to_sink": "fixture input -> fixture sink",
                      "root_cause": "Synthetic finding generated by the CI mock.",
                      "evidence": "Deterministic offline fixture evidence.",
                      "impact": "No production impact; validates report generation plumbing.",
                      "validation_status": "validated",
                      "minimal_remediation": "Keep the mock fixture deterministic.",
                      "regression_test_idea": "Assert exec-mode self-validation reaches final_status=0.",
                      "issue_title": "[Security][High] Fixture self-validation finding",
                      "issue_body_file": "reports/issue-drafts/SEC-SELF-VALIDATION-001.md",
                      "issue_recommended": True,
                      "labels": ["security", "test-fixture"],
                      "public_disclosure_risk": "Low",
                  }
              ],
          }
          (reports / "findings.json").write_text(
              json.dumps(findings, indent=2, ensure_ascii=False) + "\n",
              encoding="utf-8",
          )
          PY

          if [[ -n "$last_message" ]]; then
            printf 'offline fixture audit complete\n' > "$last_message"
          fi
          if [[ "$json_output" == "1" ]]; then
            printf '{"type":"message","message":"offline fixture audit complete"}\n'
          else
            printf 'offline fixture audit complete\n'
          fi
          : "$prepare_mode_guard"
          CODEX
          chmod +x "$RUNNER_TEMP/gra-bin/codex"

      - name: Prepare an offline fixture audit run
        run: |
          runs_dir="$RUNNER_TEMP/gra-runs"
          PATH="$RUNNER_TEMP/gra-bin:$PATH" \
            bin/gra-audit \
              --repo fixture/self-validation \
              --mode prepare \
              --run-id self-validation \
              --runs-dir "$runs_dir" \
              --no-lock

          run_dir="$runs_dir/fixture__self-validation/self-validation"
          test -f "$run_dir/context.json"
          test -f "$run_dir/prompt.exec.md"
          test -f "$run_dir/prompt.goal.md"
          test -d "$run_dir/prompts/exec"
          test -d "$run_dir/prompts/goal"
          export GRA_SELF_VALIDATION_RUN_DIR="$run_dir"
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          run_dir = Path(os.environ["GRA_SELF_VALIDATION_RUN_DIR"])
          ctx = json.loads((run_dir / "context.json").read_text(encoding="utf-8"))
          assert ctx["repo"] == "fixture/self-validation"
          assert ctx["visibility"] == "PRIVATE"
          assert ctx["network_allowed"] is False
          PY

      - name: Execute an offline fixture audit run
        run: |
          runs_dir="$RUNNER_TEMP/gra-runs-exec"
          PATH="$RUNNER_TEMP/gra-bin:$PATH" \
            bin/gra-audit \
              --repo fixture/self-validation \
              --mode exec \
              --run-id self-validation-exec \
              --runs-dir "$runs_dir" \
              --no-lock \
              --model fixture-model \
              --effort low

          run_dir="$runs_dir/fixture__self-validation/self-validation-exec"
          test -f "$run_dir/reports/findings.json"
          test -f "$run_dir/report-validation.txt"
          test -f "$run_dir/run-summary.txt"
          grep -q '^codex_status=0$' "$run_dir/run-summary.txt"
          grep -q '^validation_status=0$' "$run_dir/run-summary.txt"
          grep -q '^final_status=0$' "$run_dir/run-summary.txt"
          bin/gra-validate-report --run "$run_dir"

          export GRA_SELF_VALIDATION_RUN_DIR="$run_dir"
          export GRA_SELF_VALIDATION_RUNNER_TEMP="$RUNNER_TEMP"
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          run_dir = Path(os.environ["GRA_SELF_VALIDATION_RUN_DIR"]).resolve()
          runner_temp = Path(os.environ["GRA_SELF_VALIDATION_RUNNER_TEMP"]).resolve()
          ctx = json.loads((run_dir / "context.json").read_text(encoding="utf-8"))
          findings = json.loads((run_dir / "reports" / "findings.json").read_text(encoding="utf-8"))
          summary = dict(
              line.split("=", 1)
              for line in (run_dir / "run-summary.txt").read_text(encoding="utf-8").splitlines()
              if "=" in line
          )

          assert run_dir.is_relative_to(runner_temp)
          assert Path(summary["repo_dir"]).resolve().is_relative_to(runner_temp)
          assert Path(summary["reports_dir"]).resolve().is_relative_to(runner_temp)
          assert ctx["repo"] == "fixture/self-validation"
          assert ctx["network_allowed"] is False
          assert summary["final_status"] == "0"
          assert summary["validation_status"] == "0"
          assert findings["repo"] == ctx["repo"]
          assert findings["commit"] == ctx["commit"]
          assert findings["findings"][0]["issue_body_file"].startswith("reports/issue-drafts/")
          PY
