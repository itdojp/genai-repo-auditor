name: publish-pypi

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Upload the validated distributions through trusted publishing"
        required: true
        default: false
        type: boolean
      index:
        description: "Trusted-publishing destination"
        required: true
        default: testpypi
        type: choice
        options:
          - testpypi
          - pypi

permissions: {}

jobs:
  build-candidate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout requested package source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Require an annotated version tag on main before upload
        if: ${{ inputs.publish }}
        env:
          RELEASE_REF: ${{ github.ref_name }}
          RELEASE_REF_TYPE: ${{ github.ref_type }}
        run: |
          set -euo pipefail
          version="$(cat VERSION)"
          test "$RELEASE_REF_TYPE" = "tag"
          test "$RELEASE_REF" = "v$version"
          test "$(git cat-file -t "$RELEASE_REF")" = "tag"
          test "$(git rev-list -n 1 "$RELEASE_REF")" = "$(git rev-parse HEAD)"
          git fetch --no-tags origin main
          git merge-base --is-ancestor HEAD origin/main

      - name: Verify the matching GitHub Release before production PyPI
        if: ${{ inputs.publish && inputs.index == 'pypi' }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_COMMIT: ${{ github.sha }}
          RELEASE_REF: ${{ github.ref_name }}
          RELEASE_DIR: ${{ runner.temp }}/github-release
        run: |
          set -euo pipefail
          mkdir -p "$RELEASE_DIR"
          gh release download "$RELEASE_REF" --dir "$RELEASE_DIR"
          python scripts/build_release.py --verify --output-dir "$RELEASE_DIR"
          python - <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          release_dir = Path(os.environ["RELEASE_DIR"])
          version = Path("VERSION").read_text(encoding="utf-8").strip()
          stem = f"genai-repo-auditor-v{version}"
          expected = {
              f"{stem}.tar.gz",
              f"{stem}.zip",
              f"{stem}.cdx.json",
              "release-manifest.json",
              "SHA256SUMS",
          }
          actual = {path.name for path in release_dir.iterdir()}
          if actual != expected:
              raise SystemExit(f"GitHub Release assets differ: expected={sorted(expected)!r}, actual={sorted(actual)!r}")
          manifest = json.loads((release_dir / "release-manifest.json").read_text(encoding="utf-8"))
          checksum_lines = (release_dir / "SHA256SUMS").read_text(encoding="utf-8").splitlines()
          checksums = {}
          for line in checksum_lines:
              match = re.fullmatch(r"([0-9a-f]{64})  ([^/]+)", line)
              if not match or match.group(2) in checksums:
                  raise SystemExit("GitHub Release SHA256SUMS is malformed or contains duplicates")
              checksums[match.group(2)] = match.group(1)
          expected_primary = {f"{stem}.tar.gz", f"{stem}.zip", f"{stem}.cdx.json"}
          if set(checksums) != expected_primary | {"release-manifest.json"}:
              raise SystemExit("GitHub Release SHA256SUMS does not cover the exact release asset set")
          manifest_artifacts = manifest.get("artifacts")
          if not isinstance(manifest_artifacts, list) or {
              item.get("name") for item in manifest_artifacts if isinstance(item, dict)
          } != expected_primary or len(manifest_artifacts) != len(expected_primary):
              raise SystemExit("GitHub Release manifest artifacts do not match the release assets")
          for item in manifest_artifacts:
              path = release_dir / item["name"]
              if item.get("sha256") != checksums[item["name"]] or item.get("size") != path.stat().st_size:
                  raise SystemExit("GitHub Release manifest digest or size does not match the release asset")
          if manifest.get("schema_version") != 1 or manifest.get("version") != version:
              raise SystemExit("GitHub Release manifest schema or version does not match")
          if manifest.get("tag") != os.environ["RELEASE_REF"]:
              raise SystemExit("GitHub Release manifest tag does not match the dispatched tag")
          if manifest.get("source_commit") != os.environ["RELEASE_COMMIT"]:
              raise SystemExit("GitHub Release manifest source_commit does not match github.sha")
          PY

      - name: Install hash-locked package build validators
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check --require-hashes \
            --no-cache-dir -r .github/requirements/publish-build.txt
          mkdir -p "$RUNNER_TEMP/pypi-build-wheelhouse"
          python -m pip download --disable-pip-version-check --require-hashes \
            --no-deps --no-cache-dir \
            -r .github/requirements/publish-build.txt \
            --dest "$RUNNER_TEMP/pypi-build-wheelhouse"

      - name: Build wheel and source distribution
        run: |
          set -euo pipefail
          mkdir -p pypi-candidate/packages
          python -m build --no-isolation --outdir pypi-candidate/packages
          python -m twine check --strict pypi-candidate/packages/*
          python scripts/validate_python_distribution.py \
            --dist-dir pypi-candidate/packages
          git rev-parse HEAD > pypi-candidate/SOURCE_COMMIT
          if [[ -f "$RUNNER_TEMP/github-release/release-manifest.json" ]]; then
            cp "$RUNNER_TEMP/github-release/release-manifest.json" \
              pypi-candidate/GITHUB_RELEASE_MANIFEST.json
            cp "$RUNNER_TEMP/github-release/SHA256SUMS" \
              pypi-candidate/GITHUB_RELEASE_SHA256SUMS
          fi
          (
            cd pypi-candidate
            find . -type f ! -name SHA256SUMS -print0 \
              | sort -z \
              | xargs -0 sha256sum > SHA256SUMS
          )

      - name: Install and smoke-test the exact wheel and sdist independently
        run: |
          set -euo pipefail
          index=0
          for artifact in pypi-candidate/packages/*.whl pypi-candidate/packages/*.tar.gz; do
            index=$((index + 1))
            artifact="$(realpath "$artifact")"
            venv="$RUNNER_TEMP/gra-pypi-smoke-$index"
            runs="$RUNNER_TEMP/gra-pypi-runs-$index"
            python -m venv "$venv"
            "$venv/bin/python" -m pip install --disable-pip-version-check \
              --no-index --find-links "$RUNNER_TEMP/pypi-build-wheelhouse" \
              --no-deps setuptools==83.0.0 wheel==0.47.0
            "$venv/bin/python" -m pip install --disable-pip-version-check \
              --no-index --no-build-isolation --no-deps "$artifact"
            test "$("$venv/bin/gra-audit" --version)" = "gra-audit $(cat VERSION)"
            "$venv/bin/gra-audit" --help >/dev/null
            "$venv/bin/gra-run" --help >/dev/null
            "$venv/bin/gra-workflow-profile" --help >/dev/null
            "$venv/bin/gra-efficacy-benchmark" --list >/dev/null
            "$venv/bin/gra-doctor" --json --runs-dir "$runs" >/dev/null
            "$venv/bin/python" - <<'PY'
          from pathlib import Path
          import genai_repo_auditor as gra

          assert Path(gra.resource_path("VERSION")).is_file()
          assert Path(gra.resource_path("templates", "workflows", "recon-only.json")).is_file()
          assert Path(gra.efficacy_corpus_path("core.json")).is_file()
          PY
          done

      - name: Upload reviewed PyPI candidate
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pypi-candidate-${{ github.run_id }}
          path: pypi-candidate/
          if-no-files-found: error
          retention-days: 7

  publish-testpypi:
    if: ${{ inputs.publish && inputs.index == 'testpypi' }}
    needs: build-candidate
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      actions: read
      contents: read
      id-token: write
    steps:
      - name: Require provisioned protected TestPyPI environment
        env:
          APPROVAL: ${{ vars.PYPI_TRUSTED_PUBLISHING_APPROVED }}
        run: test "$APPROVAL" = "testpypi"

      - name: Verify TestPyPI environment protection through the GitHub API
        env:
          ENVIRONMENT_NAME: testpypi
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          environment_json="$RUNNER_TEMP/testpypi-environment.json"
          policies_json="$RUNNER_TEMP/testpypi-deployment-policies.json"
          gh api --header "X-GitHub-Api-Version: 2022-11-28" \
            "repos/$GITHUB_REPOSITORY/environments/$ENVIRONMENT_NAME" \
            > "$environment_json"
          gh api --header "X-GitHub-Api-Version: 2022-11-28" \
            "repos/$GITHUB_REPOSITORY/environments/$ENVIRONMENT_NAME/deployment-branch-policies?per_page=100" \
            > "$policies_json"
          ENVIRONMENT_JSON="$environment_json" POLICIES_JSON="$policies_json" \
            python - <<'PY'
          import json
          import os
          from pathlib import Path

          environment = json.loads(Path(os.environ["ENVIRONMENT_JSON"]).read_text(encoding="utf-8"))
          policies = json.loads(Path(os.environ["POLICIES_JSON"]).read_text(encoding="utf-8"))
          if environment.get("name") != os.environ["ENVIRONMENT_NAME"]:
              raise SystemExit("publishing environment does not exist with the exact expected name")
          reviewer_rules = [
              rule for rule in environment.get("protection_rules", [])
              if rule.get("type") == "required_reviewers"
          ]
          if len(reviewer_rules) != 1 or not reviewer_rules[0].get("reviewers"):
              raise SystemExit("publishing environment must have required reviewers")
          if reviewer_rules[0].get("prevent_self_review") is not True:
              raise SystemExit("publishing environment must prevent self-review")
          branch_policy = environment.get("deployment_branch_policy") or {}
          if branch_policy.get("custom_branch_policies") is not True:
              raise SystemExit("publishing environment must use custom deployment policies")
          entries = policies.get("branch_policies")
          if policies.get("total_count") != 1 or not isinstance(entries, list) or len(entries) != 1:
              raise SystemExit("publishing environment must have exactly one deployment policy")
          if entries[0].get("name") != "v*" or entries[0].get("type") not in (None, "tag"):
              raise SystemExit("publishing environment deployment policy must be the v* tag pattern")
          PY

      - name: Download the validated candidate
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: pypi-candidate-${{ github.run_id }}
          path: pypi-candidate

      - name: Bind candidate to the dispatched tag
        run: |
          set -euo pipefail
          test "$(cat pypi-candidate/SOURCE_COMMIT)" = "$GITHUB_SHA"
          test ! -e pypi-candidate/GITHUB_RELEASE_MANIFEST.json
          test ! -e pypi-candidate/GITHUB_RELEASE_SHA256SUMS
          (cd pypi-candidate && sha256sum -c SHA256SUMS)

      - name: Publish to TestPyPI with OIDC
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: pypi-candidate/packages/
          repository-url: https://test.pypi.org/legacy/
          attestations: true

  publish-pypi:
    if: ${{ inputs.publish && inputs.index == 'pypi' }}
    needs: build-candidate
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      actions: read
      contents: read
      id-token: write
    steps:
      - name: Require provisioned protected PyPI environment
        env:
          APPROVAL: ${{ vars.PYPI_TRUSTED_PUBLISHING_APPROVED }}
        run: test "$APPROVAL" = "pypi"

      - name: Verify PyPI environment protection through the GitHub API
        env:
          ENVIRONMENT_NAME: pypi
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          environment_json="$RUNNER_TEMP/pypi-environment.json"
          policies_json="$RUNNER_TEMP/pypi-deployment-policies.json"
          gh api --header "X-GitHub-Api-Version: 2022-11-28" \
            "repos/$GITHUB_REPOSITORY/environments/$ENVIRONMENT_NAME" \
            > "$environment_json"
          gh api --header "X-GitHub-Api-Version: 2022-11-28" \
            "repos/$GITHUB_REPOSITORY/environments/$ENVIRONMENT_NAME/deployment-branch-policies?per_page=100" \
            > "$policies_json"
          ENVIRONMENT_JSON="$environment_json" POLICIES_JSON="$policies_json" \
            python - <<'PY'
          import json
          import os
          from pathlib import Path

          environment = json.loads(Path(os.environ["ENVIRONMENT_JSON"]).read_text(encoding="utf-8"))
          policies = json.loads(Path(os.environ["POLICIES_JSON"]).read_text(encoding="utf-8"))
          if environment.get("name") != os.environ["ENVIRONMENT_NAME"]:
              raise SystemExit("publishing environment does not exist with the exact expected name")
          reviewer_rules = [
              rule for rule in environment.get("protection_rules", [])
              if rule.get("type") == "required_reviewers"
          ]
          if len(reviewer_rules) != 1 or not reviewer_rules[0].get("reviewers"):
              raise SystemExit("publishing environment must have required reviewers")
          if reviewer_rules[0].get("prevent_self_review") is not True:
              raise SystemExit("publishing environment must prevent self-review")
          branch_policy = environment.get("deployment_branch_policy") or {}
          if branch_policy.get("custom_branch_policies") is not True:
              raise SystemExit("publishing environment must use custom deployment policies")
          entries = policies.get("branch_policies")
          if policies.get("total_count") != 1 or not isinstance(entries, list) or len(entries) != 1:
              raise SystemExit("publishing environment must have exactly one deployment policy")
          if entries[0].get("name") != "v*" or entries[0].get("type") not in (None, "tag"):
              raise SystemExit("publishing environment deployment policy must be the v* tag pattern")
          PY

      - name: Download the validated candidate
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: pypi-candidate-${{ github.run_id }}
          path: pypi-candidate

      - name: Bind candidate and GitHub Release to the dispatched tag
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_REF: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          test "$(cat pypi-candidate/SOURCE_COMMIT)" = "$GITHUB_SHA"
          (cd pypi-candidate && sha256sum -c SHA256SUMS)
          live_release="$RUNNER_TEMP/live-github-release"
          mkdir -p "$live_release"
          gh release download "$RELEASE_REF" --dir "$live_release"
          LIVE_RELEASE="$live_release" python - <<'PY'
          import os
          from pathlib import Path

          release_dir = Path(os.environ["LIVE_RELEASE"])
          version = os.environ["RELEASE_REF"].removeprefix("v")
          stem = f"genai-repo-auditor-v{version}"
          expected = {f"{stem}.tar.gz", f"{stem}.zip", f"{stem}.cdx.json", "release-manifest.json", "SHA256SUMS"}
          actual = {path.name for path in release_dir.iterdir()}
          if actual != expected:
              raise SystemExit("live GitHub Release asset set changed after candidate review")
          PY
          cmp "$live_release/release-manifest.json" \
            pypi-candidate/GITHUB_RELEASE_MANIFEST.json
          cmp "$live_release/SHA256SUMS" \
            pypi-candidate/GITHUB_RELEASE_SHA256SUMS
          (cd "$live_release" && sha256sum -c SHA256SUMS)
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          manifest = json.loads(Path("pypi-candidate/GITHUB_RELEASE_MANIFEST.json").read_text(encoding="utf-8"))
          if manifest.get("tag") != os.environ["RELEASE_REF"]:
              raise SystemExit("candidate GitHub Release manifest tag does not match")
          if manifest.get("source_commit") != os.environ["GITHUB_SHA"]:
              raise SystemExit("candidate GitHub Release manifest source_commit does not match")
          PY

      - name: Publish to PyPI with OIDC
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: pypi-candidate/packages/
          attestations: true
